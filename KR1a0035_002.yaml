body:
  text: 南軒易說卷二宋張栻撰繫辭八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也四象生八卦方八卦成列而象已在其中矣然止有八卦而八卦之道未備故因而重之則立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義而爻已在其中矣爻有剛柔或以剛居柔或以柔推剛而變已在其中矣聖人觀其㑹同以行其典禮繫辭焉而命之而不能自己者其動已在其中矣或吉或凶而有得失或悔或吝而有憂虞皆生於動者乎謂在其中者言非自外至者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也六爻之義有奇有耦此剛柔所以立本也至於九六迭居此剛柔變通以趣時者也或以剛位而居之以柔或以柔位而居之以剛無非趣時以盡變者乎夫變動以利言吉凶以情遷故吉凶所以生乎動也若得貞固之道則寂然不動確乎不㧞禍亦不至吉凶無得而動之者此吉凶以貞勝者也聖人以此齋戒以神明其徳者乎故天位乎上地位乎下為法象之大而以觀於天下者以貞而能長乆也日昱乎晝月昱乎夜為垂象之大而以著明於天下者以貞而能乆照也觀天下之動知者之所謀勇者之所爭紛紛藉藉不能自已者此天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭人人能法乾坤之易簡則聖人之易不復作矣竊觀乾確然在上其日月星辰虹霓雲霧與夫晝夜有常而可凖寒暑有數而可推此示人以易也奈何仰觀諸天者不明乎乾之易轉而為難者有之坤隤然在下其山川草木蟲魚鳥獸與夫勤勞則所獲者厚荒棄則不能有秋此示人以簡也奈何俯察於地者不明乎坤之簡轉而為繁者有之此衆人在天地之間行矣而不著習矣而不察終身不能與天地相似而知其易簡之至徳聖人憂之所謂見天下之動而立爻者乃象乾坤之易簡以示人者歟使人人明乎乾坤之易簡聖人必不為之譊譊也夫爻象動於内者謂指其易簡於幽隠之中也吉凶見乎外者謂示其易簡於得失之際也功業見乎變者謂易簡其功業於從權者也聖人之情見乎辭者謂命其易簡而見於言者也天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民爲非曰義天以陽而運於上萬物資始是以大生焉地以陰而載於下品物流形是以廣生焉此生者乃天地之大徳也聖人賛天地之化育必得大寳之位然後可配天地之大生也有仁焉以守位所以博施濟衆乃利其生者也有財焉以聚衆人所以近悦逺來乃養其生者也有義焉理其財而使之流通正其辭而使之輯洽禁民爲非者慮其有以害其生者也天地之道簡而大聖人之道曲而詳簡而大者所以止曰大徳曰生至於聖人則以位而繼之以仁以財而繼之以義所以推其天地之大徳者歟古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情作結繩而為網罟以佃以漁蓋取諸離聖人之於易覺之於心悟之於性神而明之黙然而成之見天下之賾見天下之動抑何待於俯仰以觀逺近以取哉葢聖人以作易之法以傳之天下後世示其有循而體自然乎仰則觀象於天如觀其日月星辰虹霓雲霧皆取其自然之象也俯則觀法於地如觀其江河山嶽草木蟲魚皆取其自然之法也觀鳥獸之文如鴻之儀如虎之炳是也觀其物之文則知物之理從可知矣觀地之宜如丘園之物産如坎窞之幽悔則四時之氣從可知也近取諸身則乾為首坤為腹之類是也逺取諸物則乾為馬坤為牛之類是也於是始作八卦以通神明之徳以類萬物之情者乎上古之時禽獸多而人民少獸蹄鳥跡之道交於中國故包犧氏為之網罟以教民佃漁者非徒使民知鮮食之利抑亦去其害而俾民得安其居也蓋取諸離者夫離以一隂而麗乎二陽之間鳥獸之麗於網魚鼈之麗於罟其義其畫皆可得而推者乎包犧氏沒神農氏作斲木為耜揉木為耒耒耨之利以教天下葢取諸益日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑夫天産之物食之所以生精地産之物食之所以生氣民之初生摶裂禽獸茹毛飲血非徒暴殄天物而淫亂之風滋熾聖人憂之故為耒耜以教稼穡而地産所以養其氣也蓋耒耜之利所以取諸益者上震為動下巽為入農人所以深耕易耨發土膏而成五榖其致用在耒耜所以獲其益也雖然山居者足於鳥獸而不知水之所生水居者足於魚鼈而不知山之所産故物貨貿遷以其所有易其所無者日中為市致天下之民則逺近可以輻湊交易而退各得其所則出入可以相友必取諸噬嗑者蓋噬嗑成卦離上而震下離明乎上萬物皆相見為市之時也震動乎下除物之間無所不合交易而退各得其所也神農氏没黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則乆是以自天祐之吉无不利黄帝堯舜垂衣裳而天下治葢取諸乾坤包犧神農黄帝堯舜皆制器以利天下者也獨至於黄帝堯舜乃曰通其變使民不倦神而化之使民宜之何也葢伏羲神農制為網罟以教之佃漁耒耜以教之耕耨為市以教之交易夫民知飲食則嗜欲既滋民有貨財則貪求愈熾黄帝堯舜不能通其變則攘奪誕謾之俗生而乖爭陵犯之變起此無他以其飽食煖衣逸居而無教也况伏羲神農至黄帝堯舜之時上下數千百年無一簡册之可傳言語之相授所謂易窮則變變則通通則乆者皆先聖後聖以心相傳故也故在黄帝堯舜之時不得不通其變也惟通易之變則從之者無斁使民不倦也惟神而化之則由之而不失故使民宜之也此無他以伏羲神農創業於前知萬世之下必有得易之道如黄帝堯舜者窮而能變變而能通通而能乆者也故其運量無窮上下與天地同流而無紀極故曰自天祐之吉无不利也况夫乾確然示人易矣坤隤然示人簡矣天地以簡易示人而天下之人習矣而不著行矣而不察於是聖人作衣裳以被於身以啟廸天下之民故垂綃為衣其色𤣥而象道襞幅為裳其色纁而象事所以法乾坤而易之俾民知有君臣知有父子知有尊卑貴賤之分以至飛潜動植山川鬼神莫不各安其分者葢取諸乾坤者乎刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下葢取諸渙衣裳之垂固欲逺近之民不觀而化然川途之險阻則有所不通惟夫舟車之利既興則日月所照霜露所墜莫不拭目觀天下如一家中國如一人矣是以刳其木而中虚剡其木而上銳舟所以載物而楫所以進舟致逺以利天下而取諸渙者葢渙之成卦上巽而下坎象曰利渉大川乗木有功也而渙者又有㪚釋之義舟楫之用豈非㪚釋險難之器乎服牛乗馬引重致逺以利天下葢取諸隨物之重者人力不能勝故聖人穿牛鼻者所以引其重地之逺者人力不能致故聖人絡馬首者所以致其逺夫牛之角能觸人也聖人因其順而俾之引重夫馬之蹄能踢人也聖人因其健而俾之致逺皆因其性而不逆故動以說而隨其人也故於卦取隨重門擊柝以待暴客蓋取諸豫夫川有舟楫陸有牛馬塗既通則居民資之水者坐而至越陸者坐而至燕然暴客亦可至也故重門以禦之所以為㓂者不能攻擊柝以驚之所以為盜者不能竊然必取於豫者成卦二陰在前其耦也如重門一陽在中其動也如擊柝又有能豫備而能悅懌之象斷木為杵掘地為臼臼杵之利萬民以濟葢取諸小過心懐恐懼則口銜芻豢而不知味今也川塗險阻有舟車牛馬以代其勞暴客之侵有重門擊柝以為之備於是斷木為杵掘地為臼以去其糠粃以治其稻糧粒食既精饔飱既備而萬民以濟者葢取諸小過也小過之成卦上動而下止而又聖人知艱食矣復為杵臼以治其五榖此小過者乎弦木為弧剡木為矢弧矢之利以威天下葢取諸睽外有門柝以防其暴客内有杵臼以治其粒食而無以威其不軌則雖有險而不能守雖有粟而不能食此弧矢之利不可緩也夫弦木為弧剡木為矢此聖人非取其利於攻取也将以威天下之大不軌使强梗變心姦回易慮有所懼耳葢取諸睽者睽之為卦火動而上澤動而下此事雖不同乃相須以為用也不特逺方睽乖之民必待弦矢以威之又有取睽之義者後世有六弓之制竹矢之利所以極其巧者乎上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨葢取諸大壮冬則穴居以避其寒夏則野處以逃其暑當是時也鳬居鴈處而無常者以外有侵軼之患故也今也弧矢以威其不軌然後可以營宫室之制棟則上之而有所承宇則下之而有所覆震風雷雨頼其帡幪則為壮也亦大矣葢大壮之成卦二陰在上有風雨之象四陽在下有棟宇之象始取其壮而已非取其宫室之美而丹楹刻桷也古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺椁蓋取諸大過生而庇大厦死而棄之中野不可也生而居奥室死而蠅蚋姑嘬之又不可也不封不樹則無以識之䘮期無數則無以節之聖人易之以棺椁故棺周於身椁周於土棺椁之制既興則封之樹之不忘其地也䘮期有數不忘其時也必取諸大過者大過之成卦二陰周乎四方有棺椁之象又君子不以天下儉其親於此而過亦無害也上古結繩而治後世聖人易之以書契百官以治萬民以察葢取諸夬門柝之制足以防民之侵軼弓矢之利足以威民之不軌此皆小人之過惡顯然易見可得而治也若夫事之情僞是非有無虛實此包藏於内有不可測者是以聖人制為書契故書以記乆而明逺契以結信而止訟百官之務雖煩而以此治萬民之情雖隠而以此察此决去小人無所容縱於其間也故必取諸夬者葢夬者决去小人而君子之道長者乎是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也易者道也夫道也者臣不能告之於君父不能告之於子以其不可告之於人故象以像之乃所以盡其意也是以易者象也言其無適而非象也謂之象者乃所以象此以告人者歟且以八卦論之近取諸身象乾以首象坤以腹而又逺取諸物象乾以馬象坤以牛衍而伸之觸類而推之無適而非象也至於彖則統論卦義如木之有材或主一爻所在或言二體相與其終始本末兼該具備智者思過半矣至於爻則盡其趨時之變所以效天下之動或以陽居陰或以陰居陽或以貞吉而征凶或以征吉而貞凶其周流六虛不可為典要君子動則觀其變者雖然易者象也象也者像此者也謂之彖則言其象之材而已謂之爻則言其象之變而已至於吉凶則悔吝著也故悔者有改過之意至於吉則悔之著也吝者有文過之意至於凶則吝之著也故悔吝者小疵而吉凶則言乎得失至於吉凶乃悔吝之昭著而不可掩者焉陽卦多陰陰卦多陽其故何也陽卦奇陰卦耦其徳行何也陽一君而二民君子之道也陰二君而一民小人之道也震坎艮皆陽卦也然其畫皆一陽而二陰巽離兊皆陰卦也然其畫皆一陰而二陽此其所因者何也三陽之卦皆資乾之一體而成故其數奇以大而奇者為之主也三陰之卦皆資坤之一體而成故其數耦以小而耦者為之主也本其所得之徳所行之行而言之則陽一君而二民以大者宜在上也陰二君而一民以小者宜在下也大者在上故能進陽而抑陰長君子而卑小人是以為君子之道也小者在下則陰進於陽而陽退聽焉小人乗時射利而君子伏焉是以為小人之道也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也思者索其所欲慮者防其所惡思而有所欲慮而有所惡皆生於心之有妄也此咸九四所以憧憧於兩剛之間有求而往有求而來朋從爾思有所繫慮不能無心而待物又安知天下本同歸也而人自殊塗本一致也而人自百慮故日月以往來而明生寒暑以徃來而嵗成尺蠖以屈而致信龍蛇以蟄而存身故天地之道日月寒暑任氣之自運初無思慮也萬物之理尺蠖龍蛇委形之自然初無思慮也是以逹乎此理故精義入神以致用此能為可用也利用安身以崇徳此不求其必用也始焉精義入神以致吾身之用及夫利用宜乎為用所惑亟於求用矣乃安身以崇徳此得乎同歸一致之理而明乎何思何慮者也雖然此特有用之可名也故日月寒暑則運此者也尺蠖龍蛇則由此者也精義入神以致用則造此而極其自得者也利用安身以崇徳則覺此而極其髙明者也故過此以徃則雖聖人自為不敢知焉未之或知者猶書所謂我不敢知是也所以窮神知化而造於徳之盛焉易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既危且辱死期将至妻其可得見邪困人所不免也要在處之有道困而不失其所亨者乃為君子困之六三應於上六而上六無情屹然不動有類於石者也下乗於九二然九傷已有類於蒺藜者也有應於上将以求名今困於石此非所困而困焉名必辱也有依於下将以安身今據於蒺藜此非所據而據焉身必危也夫在困之時名辱身危有死之理此身不行道雖主饋之妻且不可見宜乎凶也易曰公用射隼于髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也解之六三以貪殘小人輙居髙位有隼居髙墉之象而上六韜已成之器乗可為之時故𤼵强剛毅誅鋤强梗如摧枯拉朽動而不括出而有獲以解其悖戾之心者亦以成器而動故也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也仁義所以責於君子小人不以不仁為恥不以不義為畏夫仁義不足責故非利則不勸非威則不懲也人不知義而所見者利苟不早有以懲之則将至於無父無君其禍有不可勝言者此噬嗑之初九所以制之於其小屨校滅趾而使之不行乃小懲而大誡也使小人知所忌憚不敢肆其暴戾是乃小人之福也善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶善之於惡皆曰積善固可欲也然不積亦未至於成名惡固可惡也然不積亦未至於滅身奈何小人以小善未足以成名而不為以小惡未足以滅身而不去終至惡積而不可掩罪大而不可解至於噬嗑上九何校滅耳凶由此觀之初之屨滅趾使之不行者豈非小人之福乎子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑否之九五休天下之否而天下已向於㤗通之時也然古之人君在解則必思夙吉在既濟則必思豫防故人皆樂於安也乃安而不忘危人皆知其存也乃存而不忘亡人皆習於治也乃治而不忘亂如此則身安而國家可保故曰其亡其亡繫于苞桑夫審其亡之戒而繫之苞桑則根本固而不可動摇矣子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也古之人方其人君任用之際必自揣其才力可以勝其任乎然後膺人君顧託庻幾上不負其社稷下不負其生靈鼎之九四徳薄而位尊知小而謀大力小而任重如鼎之折足其形流汗而凶也葢不能自揣以勝其所任乎子曰知㡬其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寜用終日斷可識矣君子知微知彰知柔知剛萬夫之望豫之六二當天下悅豫之時人皆樂通於物而為恱也六二乃介然如石當是時也上交於五不為諂諛也下交於初不為褻瀆也乃介如石焉其方寸之地淵静而物來能名事至能斷寜用終日斷可識矣故在微而能知彰在柔而能知剛宜乎天下萬民望之而為標準也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祇悔元吉復貴於早顔氏之子有不善未嘗不知知之未嘗復行方其萌於心謀於慮乃改其過而不行此近於復之初九所以无祇悔也天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶天下之理惟一致者能得其要用志不分乃凝於神苟挾二三之心狐疑之志則安能盡誠而進於徳乎損之六三所謂三人行則損一人一人行則得其友能致一者也益之上九莫益之或擊之立心勿恒凶不能致一者也竊觀天地絪緼萬物化醇此二氣所以致一也男女構精萬物化生此六子所以致一也身不安則存諸已未定孰能為人乎故安其身而後動可也心不易則是非毁譽懷於胸中而與之交戰能無懼乎故易其心而後語可也交不定則好惡異尚而情不通孰肯應乎故定其交而後求可也益之上九立心勿恒不能盡此所以致凶邵子曰絪氣之相因緼氣之相温相因以為合相温以為和此萬物之化也醇而已醇者其氣也所謂精神生於道者也男女構精萬物化生則生者精也道㪚而有一以至萬則萬物皆出於一人之所以致一者順性命之理而不以妄易真以復其本而已此損之六三言致一也子曰乾坤其易之門邪乾陽物也坤陰物也陰陽合徳而剛柔有體以體天地之撰以通神明之徳其稱名也雜而不越於稽其類其衰世之意邪易寓於乾坤乾坤可以見易故乾坤乃易之門言易之道出入於乾坤之兩間者乎以卦言之乾之三奇乃陽物也坤之三耦乃陰物也三奇三耦索而為六子互體卦變積而為六十四此陰陽合徳而剛柔有體也夫四時之迭運五行之攸序皆天地之撰也聖人作易所以體天地之撰者如損益之盈虛剥復之進退乃體天地之撰者乎陰陽之造化剛柔之消長皆神明之徳也聖人作易所以通神明之徳者如知死生之說知幽明之故乃通神明之徳者乎是以三易之稱或曰歸藏而始於坤或曰連山而始於艮或曰周易而始於乾坤此三者之名雖曰雜也然其畫皆六其卦皆八初未嘗越於道也然考其類之所在則夏曰連山商曰歸藏周曰周易皆世衰道微者乎夫易彰徃而察來而微顯闡幽開而當名辨物正言斷辭則備矣論易之神彰徃察來論易之道微顯闡幽徃來以時言或徃或來以其無常人不能知也惟易之神徃者彰之來者察之微幽以理言或微或幽人不能察也惟易之道微者顯之幽者闡之易之神易之道儻非乾坤開而當名辨物正言斷辭則易之道安能備而無窮乎是以乾陽物其數為奇坤陰物其數為耦陽奇陰耦以示之然後即其健而名之以乾即其順而名之以坤以至六子六十四卦當其名也夫名既當則剛柔之物雖曰相雜葢有自然而辨者矣言天下之至賾而為象言天下之至動而為爻以至吉凶者言乎其失得悔吝者言乎其小疵皆正其言也夫言既正則辭之指其所者葢有自然而斷者矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隠因貳以濟民行以明失得之報夫名卦曰睽而已而天地之事同男女之事類在焉名卦以恒而已而日月之乆照四時之九成在焉此稱名小而取類大也利用安身窮神知化九四之意深矣其辭乃曰憧憧徃來朋從爾思而已氤氲化醇男女構精損六三之意逺矣其辭乃曰三人行則損一人一人行則得其友而已此其㫖逺其辭文也在同人未嘗言同所言者類族辨物大師相克之事其言雖曲也乃中其尚同大過之弊也在鼎所載者以木巽火烹飪之事其事甚肆而易見也然所寓者皆養賢享帝與夫取新之道隠於其間也是以民之雖安其危而利其葘樂其所以亡甚者有知者疑而不能肆其謀有力者疑而不能肆其勇此聖人之作易所以因民之疑以濟其民行所以明其得失之報易之興也其於中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也巽徳之制也履和而至謙尊而光復小而辨於物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隠履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辨義巽以行權伏羲神農黄帝堯舜之時上下數千百年民淳事簡三畫足以周天地之情八卦足以盡事物之變當是時也易不以不興而亡也及夫周之文王在商受之時有君人之大徳内文明而外柔順望道而未見於是重伏羲之一卦而八八卦而六十四一爻而六六爻而三百八十四此易所以興於中古也然六十四卦皆濟民行而出民於憂患也而特取九卦以言之者葢渉世路始於履終於巽則庶幾免人道之患也此所以三言之是以君子以非禮勿履欲崇其徳必始於禮履為徳之基謙者處後而人先之君子有終不可須臾去也故曰謙徳之柄人復而反本則不逐於末故曰復徳之本人而無恒不可以作巫醫故恒則徳之固而不可動摇乎損去其害徳者徳自此而修矣益者日益以増而進故綽然有餘也在困窮之時不待言而徳自辨矣風雨然後知雞鳴不已嵗寒然後知松栢之後彫也積徳如井内不失已外不失人而又不改焉所以為徳之地巽以行權巽為本言其曲直不執一節巽為風言其去來不知所自徳至於巽則逹權通變制於事而不執於一方如工之制器者乎孔子論乾之九三曰知至至之可與幾也葢言九三不中能知中之可至此知幾也故中者可至之地不及於中非至也過於中非至也禮而行其大同於人而又得不失於中也故曰履和而至謙之彖曰謙尊而光此又復云者言尊者知謙則合幷天下衆善善為君子之光者矣人知復貴乎早方其發於心萌於慮如顔子之不逺復此小而辨於物也若夫物交物則引之而已白而易汙者不若湼而不緇剛而易折者不若磨而不磷故有恒徳者雜之而不厭然後見其道之乆也去其害己懲忿窒欲所以為難也及夫毁己逺害則復易焉天下之益有心為之此出於作為所以為設也人君之益天下天地之益萬物長之裕之皆貴於不設因其自然可也在困而能通者所以為君子也是以經曰困而不失其所亨者其唯君子乎故窮阨禍患人不我知君不我用此困宜乎窮也然君子致命遂志而其道常通者乃困而不失其所亨也能存諸己然後可以推而及人井居其所乃存諸己徃來井井遷而及人者也凡為人者必失已為己者必失人惟井居其所而遷此物我兩存也有智名者智有時而窮有勇名者勇有時而竭曽不知巽之為道時之或文或質事之或寛或猛皆稱其宜殆求其迹而不可見者此巽稱而隠者乎人之行或太過或不及或為人或為己不得其節者多矣惟履有以和其行則仁不失於姑息義不失於刻剥信不至於失己智不至於穿鑿此履所以和行也謙之象曰稱物平施而傳謙以輕為戒故君子之謙非樂於下人者也徳言盛禮言恭謙以制禮而未嘗過也有不善未嘗不知知之未嘗復行也此豈非自知乎此非因人而知乃悟之於心覺之於性也故曰復以自知徳惟一動罔不吉徳二三動罔不凶恒之君子素富貴行乎富貴素貧賤行乎貧賤其徳如天地之貞觀日月之貞明終始如一故曰恒以一徳九卦所論皆修身行己之事損以逺害益以興利非謂去天下之害興天下之利也害於己者逺之如懲忿窒欲是也利於己者興之如遷善改過是也逺害之逺如逺佞人之逺興利之興如興於詩之興在困而怨者不能樂天者也然人皆有情能寡其怨者亦可貴也欲知義觀諸井則義明矣此井所以辨義九卦惟井為象之顯然者所以明其義人之出處進退取舎辭受即井以明之故内能存已外不絶物乃為義也孔子論可與共學未可與適道可與適道未可與立可與立未可與權此權不易至也至於巽以行權則人道之患莫能及矣所以終之以此易之為書也不可逺為道也屢遷變動不居周流六虚上下无常剛柔相易不可為典要唯變所適其出入以度外内使知懼又明於憂患與故无有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行易之書所以載道以其載道故不可逺如居則觀其象而玩其辭動則觀其變而玩其占譬之日月之於人水火之養生人雖欲逺之有不可得者故曰不可逺故其為道也屢遷觀其變動不居周流六虚此言六爻無定位也上下無常剛柔相易此言六爻無定體也惟變動不居周流於六位之間故六位為虚器惟上下无常而莫適乎剛柔之用故剛柔无定體非若册之有典而太常可考也非若體之有要而衆形可會也唯變所適而已凡此者皆言其為道也屢遷者歟其出以度外則无外患也其入以度内則无内患也易之辭各指其所之此其所以内外使知懼也出門者固有功矣逖出者固无咎矣然不出戸者在節乃為知時入于林中者固吝矣入于坎窞者固勿用矣然視履而旋者在履乃為有慶是其可懼也如此辭之所告非特使之知懼又明憂患與夫憂患之所因此書之不可逺也无有師保如臨父母焉夫師者教之道而有所欽也保者輔其功而有所愛也夫有師保而後欽愛者此學而後知教而後能非天性之自然也人之於易不待師保而欽愛之心如臨父母此附麗不以膠漆約束不以纒索不可逺之道出於天性之自然者乎大扺易之辭其告人也各指其所之有上有下有内有外循其辭而揆其所指之方則不迷其所向其道雖不可為典要與其書則有典可循有常可道也凡此者皆以其書之不可逺者歟嗚呼人能𢎞道非道𢎞人雖載道而不可逺道雖屢遷而未始有常神而明之存乎其人者也苟非其人則道安能虛行乎易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣如乾之卦所以原陽之始要陽之終如坤之卦所以原陰之始要陰之終此為質也此卦之徳方以知也至於觀其㑹通以行其典禮者時也分陰分陽迭用柔剛者物也六爻相雜唯其時物此六爻之義所以易以貢也其初難知謂凡爻之初辭隠而難知者謂初辭擬之故也凡爻之上辭顯而易知者謂卒成之終故也此本末所以不同者如此若夫或以陽居陰或以陰居陽其物之交錯者此雜物也或中或不中或正或不正其徳之迭作者此撰徳也辨其當於理者為是辨其悖於理者為非其唯中爻乎二三四五是也易之中爻其辨是與非者可謂備矣苟明乎此而求其要則存亡吉凶可坐而知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪彖者言乎象者也葢言卦之不言之意具於彖者乎彖者材也葢言卦之兼該之體備於此者乎故智者觀其彖辭則所得者已七八矣又何必中爻雜物撰徳而辨其是非乎二與四皆陰而二居内四居外三與五皆陽而三為臣五為君是謂同功而異位也二與四雖俱陰也然二多譽者以進於君而令聞令望歸之也四多懼者以其近於君而抑權損勢也然柔之為道固當有所麗而不利於逺若夫其要无咎則所貴者在其中爾此二所以逺而多譽以其得於柔中故其要无咎也三與五雖俱陽也然三多凶者以其居下卦之上而近於賤五多功者以其居上卦之中而處其貴故也然三也以柔處之則危而不安以剛處之則重剛而勝也論二與四詳於二而略於四論三與五詳於三而略於五此互相備即此以見彼也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易之為書所以載三才之道此其所以為廣大悉備也立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義此易所以六畫而成卦六位而成章六者非他乃三才之道也三才之道其所變動如天之陰陽地之柔剛人之仁義有所變動也如陽氣下降陰氣上升柔來而文剛剛上而文柔仁濟之以義義濟之以仁此天地之道有所變動以趨其時者乃所以為爻也觀爻之二四有逺邇之殊三五有貴賤之異或多譽而多懼或多凶而多功其等等不可移者所以為物也至於三五之陽而以柔居之縦横錯綜經緯无常此物之相雜故曰文也文之不當則宜凶也而併與吉言者葢不當而凶乃知其當而吉故也易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也道汙則從而汙此商之末世也道隆則從而隆此周之盛徳也觀諸文王與紂則危者使平易者使傾葢可知矣文王囚于羑里望道未見以其小心翼翼而尊其易故危者使平也紂貴為天子以其殺戮無辜而悖於易故易者使傾也其道甚大世之百物所以不廢者易有以行乎天地之中故無廢墜也既懼其始使人防微杜漸又懼其終使人持盈守成其要之以无咎而補過乃易之道也夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者健者疑若不知險也今乾為天下之至健其徳行常易故知險而不為陰所陷豈非至健乎順者疑若不知阻也今坤為天下之至順其徳行常簡故知阻而不為陽所拒豈非至順乎大扺易則易知簡則易從故能說諸心知險知阻故能研諸慮心之説也不忤於理慮之研也不昧於事則得者為吉失者為凶吉凶既定則凡勉於事功者莫不𢎞之不息以成其功矣是故變化云為吉事有祥象事知器占事知來聖人悟易於心而天道之變化人事之云為得之於心者如此則知幾之神吉事有祥也推此以利養生民故象事知器推此以吉凶與民同患故占事知來變者陽也化者陰也謂之變化此陰陽未辨者乎云者言也為者行也謂之云為此言行未著者乎聖人之心術雖融貫天人之道於方寸之間其見微知著觀徃知來無非吉事有祥也故推之以制器則利養天下之民推之以為占則吉凶與民同患天地設位聖人成能人謀鬼謀百姓與能天能天而不能地地能地而不能天所頼聖人成其能夫聖人之能成天地其能可謂大矣然又且明謀之人如詢于芻蕘是也幽謀之鬼神如質諸卜筮是也如是則不忍以為能故百姓莫不歸羙以與其能矣八卦以象告爻彖以情言剛柔雜居而吉凶可見矣八卦成列象在其中矣此八卦所以告人以象至於爻者變也彖者材也皆有辭者此聖人以情而言於人也剛柔雜居則交通以趨時而或失或得故吉凶見焉變動以利言吉凶以情遷乾之徳有利有正變動以利言非正也人之生有性有情吉凶以情遷非性也正則無變動矣性則無吉凶矣六爻之變動将以圖利而免害也六爻之吉凶無非以情而感物也是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生彼之所愛此或惡之此之所惡彼或愛之此愛惡出於情之不同而吉凶所以生也逺者或有求於近近者或有求於逺此逺近出於分之不等而悔吝所以生也以情感者或應之以偽以偽感者或應之以情此情偽出於心之不一而利害所以生也此聖人作易畢羅天下之事者乎凡易之情近而不相得則凶或害之悔且吝天下之物同聲相應同氣相求所以相近而相得也廟堂之上閨門之中鄉黨之間學校之内皆貴乎近而相得也今也近而不得其為患也異乎行道之人故大則凶小則害其微則為悔吝矣考諸易爻莫不皆然故云凡易之情将叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈叛而親離者内負所愧故其辭慙疑而備豫者蔓衍不根故其辭必枝吉人為善不足故言出於不得已故其辭寡躁人之急於自售故言必期於見信故其辭多人有善也誣而謗之則其辭不敢正言人之非故曰其辭游失其守則不能直已以見道故曰其辭屈聖人既有以知人之情又有以察人之辭何異疎而不漏者乎南軒易説卷二
