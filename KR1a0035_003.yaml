body:
  text: 南軒易說卷三宋張栻撰說卦昔者聖人之作易也幽賛於神明而生蓍參天兩地而倚數觀變於陰陽而立卦發揮於剛柔而生爻和順於道徳而理於義窮理盡性以至於命義在我也命在天也天下之人皆知義命則聖人之易不作矣惟夫不知義者甘心於自暴自棄不知命者奔競而患得患失此聖人不得已而生蓍倚數立卦生爻凡以為天下知義命者設也是以天地能生蓍之形而不能生蓍之用惟聖人之徳賛於神明故分之卦之揲之以四歸奇於扐生其用而至於圓而神也一三五七九皆陽數也獨以一三五參之而用九此倚其陽數也二四六八十者皆陰數也獨以二四兩之而用六者此倚其陰數也特取九六而不用夫七八者乃參天兩地而倚其數也純陽為乾純陰為坤及夫陰陽之變則陽卦多陰陰卦多陽此卦所以立也剛柔者所以立本變通者所以趨時必待發其所藴揮其所聚此爻所以生也道者出于天徳者得于已能和順道徳自然於義无所亂也故曰理於義如此則人盡矣萬物有自然之理一身有自然之性能窮理盡性自然於命無所負矣故曰至於命如此則天道盡矣昔者聖人之作易也将以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章君子不謂性有命存焉故凡耳之於聲目之於色鼻之於臭口之於味四支之於安佚雖曰性也詎可以性而害其命乎君子不謂命有性存焉凡仁之於父子義之於君臣禮之於賔主智之於賢者聖人之於天道雖曰命也詎可以命而害其性乎奈何中古以降人偽日滋天機日澆以性滅命者必以人而勝天以命廢性者必以天而勝人天人之理顛倒錯亂聖人作易方其未作之前其意已在焉故曰将以順性命之理者也是以二與四同功而初亦如之三與五同功而上亦如之此分陰分陽也居剛者不必皆剛而或以柔居柔者不必皆柔而或以剛此迭用柔剛也分之以示其理之之經也迭用以示其理之之緯也此六位而成章者經緯交錯而成也易道至此成矣天地定位山澤通氣雷風相薄水火不相射八卦相錯數徃者順知來者逆是故易逆數也自太極生兩儀兩儀生四象四象生八卦故八卦者乃聖人闡其神明之徳以示人者也是以天運乎上地處乎下此天地定其位也山之殺瘦澤之増肥此山澤通氣也雷之震驚至於拔山風之鼔舞至於振海各恃其功故曰相薄火之炎上其性燥水之流下其性濕不可相近故曰不相射此麗於有形渉於有數其勢若不相悖者也及夫聖人作易乾坤交通而天地之位或上或下艮兌相與而山澤之氣或止或悦以至震巽合而雷風迭用坎離濟而水火成功此八卦相錯而六十四卦三百八十四爻可以窮造化之大測鬼神之幽逆而推之則四象兩儀與夫太極之逺可坐而致也大抵天下之事數徃者順知來者逆故善作樂者必求之於無聲欲制禮者必求之於太始易之於天下皆逆數以察其來故易逆數也逆如逆暑逆寒之謂豫為之主者也雷以動之風以㪚之雨以潤之日以烜之艮以止之兌以說之乾以君之坤以藏之陽氣升而阻於陰此雷所以動而震發其萬物也陰氣逹而礙於陽此風所以㪚而吹嘘其萬物也陰之不固而成和於陽者此雨所以潤萬物異乎灌溉之勞也陽之所宗而不爍於陰者此日所以烜萬物異乎爝火之微也此四者取其生物也故主象以言之物之小大長短之不同剛柔緩急之不等椿菌各安其夀夭鵬鷃各得其巨細物物有正性物物有正命者有艮以止之者歟太和所稟而無所乖戾大順所鍾而無所偏陂勞者自此而少息華者自此而向成者有兌以說之者歟夫有風雷以作其氣有雨日以成其形而又有艮以止其分兌以說其情豈無司其造化之權者乎此乾所以君之也豈無㝠其出入之機者乎此坤所以藏之也此四者取其成物也故主卦以言之帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治葢取諸此也帝者神之應而生物之所宗也帝出乎震於方為東於時為春萬物從之而出方其出也草昧而不齊汙穢而不潔惟至於東南然後齊而潔潔齊然後可以相見故離也者於方為南於時為夏萬物亨嘉而相見聖人出人天之本宗應帝王之興起南面而聽天下嚮明而治亦體天道以臨其人者也故曰葢取諸此言其不恃其明以聽天下者乎坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮坤西南也乃夏秋之交也然萬物皆致養於坤如萬物資生者是也至於出機入機出㝠入㝠生於此而反於此未始暫停而坤乃隤然在下此致役乎坤也萬物自出乎震相見乎離而又致役乎坤可謂勞乎至兌之西方於時為秋所以少息此萬物所以説也至於西北則陽自外來而為主於内陰恃已盛之勢而未肯聽命此戰乎乾所以陰陽相薄也坎也者萬物交精乎天一今也復歸於此故曰勞乎坎勞者如勞師之勞勞其還也惟艮介乎東北之地乃春冬之交萬物所從出入之方所以成其終而成其始故曰成言乎艮神也者妙萬物而為言者也夫八卦各有所在也而神則無在而無不在八卦各有所為也而神則無為而無不為謂之生萬物乎然未嘗不成萬物也謂之成萬物乎然未嘗不生萬物也强名之曰神者即其妙萬物而强名之也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也此論六子萬物不能以自生有雷以動之有風以㪚之萬物不能以自成有火以燥之有澤以說之有水以潤之然終之而萬物有所歸始之而萬物有所出者此莫盛乎艮也前言天地定位山澤通氣終於水火不相射葢言八卦各立以為體也此言水火相逮終於山澤通氣者葢言六子交通為用也水之飲酌有待於火火之烹飪有湏於水此水火相逮也雷之震驚有風以㪚之風之鼓舞有雷以先之此雷風不相悖也山之氣下下通乎澤澤之氣上上通乎山此山澤通氣也惟六爻交相為用故變者自無而有化者自有而無此既成萬物者乎乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌説也乾之純陽故其性健震得其陽而在下故動也坎得其陽而在中故陷也艮得其陽而在上故止也凡此者皆得其陽而未全者也坤之純陰故其性順巽得其陰而在下故入也離得其隂而在中故麗也兌得其陰而在上故説也凡此者皆得其陰而不全者乎乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊乾得陽而健故為馬者以其致逺也坤得陰而順故為牛者以其任重也震為龍者龍善動而升降自如而東方之七宿其象蒼龍也巽為雞者雞知時善變而工商執雞者亦如其知時坎為豕者豕主汙濕其性趨下也離為雉雉性耿介而外文明也艮為狗言其能止人而又止於人也兑為羊言其外柔而内狠也凡此者皆逺取諸物也乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口其形上圓而五官寓而衆陽之所㑹者首也五臟六腑之所存而陰虛有所受者腹也足在下而善動震一陽而在乎二陰之下善動者也故震為足股輔上而善隨一陰伏乎二陽之下善動者也故巽為股坎為耳耳者内陽也而又為水故耳必下而能聽離為目目者内陰也而又為火故目必仰而能視艮為手執之而有釋之而無而四支之所止也兌為口出言以説人飲食以說體此兌所以為口也凡此者皆近取諸身也乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女老陽為父故乾為父老陰為母故坤為母老陽能變故自下而索震為長男自中而索坎為中男自上而索艮為少男老陰能變故自下而索巽為長女自中而索離為中女自上而索兌為少女乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果乾為天者運而不息得諸陽而在上者也圜者運而無窮而考工記謂衣裳畫火為圜亦以象乾也為君為父道之尊也為玉為金徳之貴也乾位在亥其陽氣自下而升故陰氣凜冽而為寒凝結而為冰其畫皆一故為大赤異乎坎之為赤也為良馬者言其性為老馬者言其數為瘠馬者言其剛為駁馬者言其變為木果者言其陽氣能生者乎坤為地為母為布為釜為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑坤為地者言其隤然下載上承於天也為母者親而不尊生産而萬物育也為布者言其無逺無近行地無疆徳合無疆者也為釜者化物而不化於物者也為吝嗇者其静也翕而歛藏為事也為均者其勢均平而無偏陂者也為子母牛善載而生生也為大輿方而下載者也文事武備宜乎坤為文也其畫皆耦故為衆也用處物之後而持其權者柄也其於地也為黑者陰之色也異乎乾之為大赤震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮陽氣自下而上者故為雷也潜升在已而動之以時者故為龍也震為四時之首天地始交二氣未分故為𤣥黄方春而發生萌芽條逹故為旉萬物由之而出異乎艮之徑路故為大塗對女而言故為長男為長子者亦以其一索而得之陽動於下物莫能遏故其性以燥根之盤結而下其剛者為竹其柔者為蘆葦皆一陽在下故也凡物不得其平則鳴在下而不得其平故為馬之善鳴也後足白謂之馵見爾雅左為陽而右為陰後足左白則陰不先動從陽而作故也為作足者一陽性動而作於下也二陰在外而著見故為的顙凡五榖草木之實必倒生焉言其陽陰自下而生在人亦然凡陽有自然之性震之究必終於為乾故其究為健於春而蕃鮮震其時乎巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦曲直不一即從權也故為木善入而無形故為風一索為坤故為長女能屈能伸故為繩直制器不専於一方而用其隠故為工白受采而無不入也故為白不自矜故為長自下而人髙之故為髙巽則進退不果故為進退又為不果也臭逹乎逺而無不通故為臭髮者血之餘也一陰在内其氣耗故為寡髮二陽在上昭然顯白故為廣顙木開竅為目金於色為白巽為木而在己金生於己而尅木焉故為多白眼離為南方日中之市而巽去離不逺也故為近利市三倍凡物極則反故巽順之至究則為躁卦以陰本自性者乎坎為水為溝瀆為隠伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心一陽在内二陰在外内明外晦故為水也為溝瀆者水之流行者也為隠伏者水之淵深者也為矯者以曲而直為輮者以直而曲有矯輮而外之勢不泛濫而潰亂者古人之行水者如此弓葢二十有八所以蔽其車之上輪輻三十所以載其下為弓輪所以行坎之險也水之為物生北而北方之志為恐恐則加於憂也五行之氣在藏於心為火坎為水則勝於火故於心為病水在藏為腎開竅於耳而坎一在中故為耳痛氣為陽而血為陰周流於四支亦猶水之天地間故為血其一在中異乎乾之純陽為大赤也故為赤陽在其中其於馬為美脊其性善動故為亟心其性趨下故為下首險而多陷故為薄蹄而不利於行馬援傳注云蹄欲厚故也盈科而後進故為曵平原易野故輿行而無阻也在坎故多眚萬折而歸於東故為通外晦内明故為月行於陰而善陷故為盜水生木而一生其中故為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其於木也為科上槁離為南方故為火外明内晦故為日此明於陽者也在幽而明故為電此明於陰者也再索於坤而得之故為中女甲冑外堅所以象離之畫戈兵上鋭所以象火之性腹陰而有容坤為腹而離得坤在中故為大腹暵其萬物故為乾卦鼈無耳而併精於目如離之明蟹用心之躁如離之性也蠃上鋭而有所麗其象離之形乎蚌内陰而産珠其象離之中虛乎至於龜則於人為靈於己則昧於此外明内晦也火尅木而槁故為科上槁艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔啄之屬其於木也為堅多節艮之一陽上而止其所故為山也徑小也路大也萬物自此而入故小自此而出故大故為徑路而又為小石也葢石之小者有可轉之理乃能動能静者乎一陽在上而徃來出入莫不由於斯者此門闕也果者一陽在上之象也蓏者二陰在下之象也閽人譏其出入而為之啟閽寺人相道出入之事而糾之閽人掌其奇服怪民不入此司外者也寺人掌内宫之戒令此司内者也為指乃四支之止亦指其出入者也為狗止而能止人者也為鼠陰而止其所者也狗陽而能止其所者乎黔黑色之潜者而艮為東北喙吐納出入其又止於上者也堅剛在内則此為堅多節者歟兌為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊澤能畜水而説物於枯悴之時故兌為澤三索於坤而得之故為少女為巫以言語而説神而又以說人者也為口舌以言而説人以食而説已兌正秋故毁折異乎震之蕃鮮也震為決躁以其剛陽至於兌則不能決物附於人而決之耳剛鹵者色白外柔而内剛者也為妾陰之不正而説于人者乎羊者外説而狠者乎序卦有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以䝉天地者萬物父母故有萬物然後天覆乎上地載乎下而萬物在天地間充滿宇宙此盈天地之間者唯萬物也夫天地之氣始交而陰陽之氣甄陶孕育勾而未萌甲而未拆此屯所以為物之始生也其生也蒙雜而未著故受之以蒙也蒙者蒙也物之稺也物稺不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟蒙者蒙也此始生之初自然而蒙也異乎物之蒙而蒙也此物之幼稺不可不養者乎故受之以需需者乃養之以中正不失其陰陽之和故為飲食之道也夫飲食人之大欲不得其欲而必致訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜烹黿勿與遂萌簒殺之心採桑侵疆乃起戰爭之患故始乎訟而衆起故受之以師也夫自五人為伍積而至萬二千五百人為師此師所以為衆然而無所比安能統而歸於一乎故受之以比者言其相親比而有所畜止故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也以内言之嘉㑹足以合禮以外言之萬物盛多可以備禮故受之以禮也履得其道則所履者泰無適而不安矣此履所以受之以泰泰者陰陽交感而無所間故為通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也治亂之相仍如環之無端故物安有久通者乎故受之以否夫泰而驕者所以致否否而畏者所以復泰此物不可終否故受之以同人也人能樂以天下與天下同其樂憂以天下與天下同其憂此與人同也而物歸焉故受之以大有有天下之大者不可自任其聰明要在持之以謙惟能持之以謙故優游而無事矣故謙以受之以豫惟能悦以動故天下之人如蟻之慕羶蛾之赴火矣此象所以必有所隨也天下之人推之不去却之不得中心說而從之然後建立功業必有成績此以喜隨人者必有事故受之以蠱而蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄事之在天下未有驟而大者必積累以成之然後至於大有事而後可大故受之以臨臨者二陽進而四陰退駸駸已向於大矣天下皆山也惟泰山可觀天下皆水也惟東海可觀况於人乎惟物大然後可觀惟其可觀然後有所合也太公居東海之濱伯夷居北海之濵所以盍歸於文王者以文王可觀然後有所合也故受之噬嗑夫有物間之故欲合而不可得矣惟噬而後嗑此噬嗑所以為噬去小人而君子合也然物不可以苟合無故而合必以無故而離聖人必綢繆委曲憂其合之易則㪚之亦易也故受之以賁賁者飾之以禮而為之文飾也夫賁者設飾則貴於文者夫文之太過則㓕其質而有所不通故致飾則亨有所盡言其不通故受之以剥剥者五陰剥一陽此所以為剥也然寒極則生暑陰極則生陽陰窮於上則陽復於下此窮上反下故受之以復凡天下之事皆妄也惟復而反本則無妄然後受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也天之生民有孚於中能有其无妄則所養大矣故受之以大畜物畜然後可以推而養人故受之以頥頥者養也不養安能出而應世動而有為乎不成則不逹也故頥然後繼之以大過也故大過也從權以濟其一時然大過有弊物不可以終過故受之以坎夫物過其中則陷而入於險矣陷而入於險必思有所附麗而出其險故受之以離離者麗也上經始於乾坤而終於坎離者此其序也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯序卦上經之首不言乾坤下經之首不言咸者葢天地者形也乾坤者天地之道也於序卦言天地欲人即天地以求其乾坤者歟有心為感無心為咸於序卦言夫婦而不言咸者欲人即夫婦以求其無心之咸者歟葢乾坤與咸初無所受故也未有天地而萬物安從生及夫天位乎上而施其氣地處乎下而生其形此有天地然後有萬物也夫乾天也故稱乎父所以成男坤地也故稱乎母所以成女此有萬物然後有男女也男女者言其自然之别也男正位乎外必有以代其終女正位乎内必有以造其始者此男女睽而其志通故有男女然後有夫婦者言其自然之配也夫婦之道納采問名親迎下嫁不敢苟合者以父子之道已肇於此也謂之父子言其有自然之繼也父子之間視安問寢合室異居不敢褻凟者以君臣之道已著於此也謂之君臣言其有自然之分也至於有君臣則上下之分不得不嚴所謂男女夫婦父子其尊卑髙下咸有自然之分也知自别於萬物之中者以其有上下而禮為之莭文義為之設飾而禮義有所錯故也夫婦之道不可以不乆也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壮故受之以晉晉者進也君子以永終知敝使三十之男二十之女夫婦偕老而無華落色衰之棄此夫婦之道所以貴於恒而久也此咸而受之以恒而恒為久也夫流水不濁戸樞不蠧物之久居其所則蠱而易壞故受之以遯遯者知退而有所遷者也夫遯而退則弱然柔弱所以致强壮也故受之以大壮物壮則老其可久乎故受之以晉晉者柔進而上行故也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也日中則昃月滿則虧故進而不已必有所傷故受之以明夷明夷者明入地中而有所傷也人困苦則呼父母林回棄千金之璧負赤子而趨故傷於外者必反於家夫家固有父子之親夫婦之愛然身不行道則父子夫婦無復親矣此家道窮則乖離而不和此家人所以繼之以睽而睽所以為乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益三軍同心則胡越一家六親不和則舟中咸作敵睽乖而不和宜乎有難也故受之以蹇蹇見險而止所以為難然皇天多難所以増益其所不能故勾踐之伯生於㑹稽而威公之伯生於在莒此物不可以終難故受之以解解者脫於險而人情之所懈怠有攸徃夙吉者世鮮其人故曰解者緩也夫在解而緩則所失多矣故受之以損凡物有損而致益如木落則糞本是也損而不已必益故受之以益也益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困天下之事益而不已則失其常分如斷鶴續鳬揠苖助長反為害矣故益而不已有必決之理而決者決也善惡不兩立邪正不並行有所間則君子無相遇之理故決去小人則君子交而遇也故受之以姤而姤者天地交也凡物相遇然後聚如羊狼不同囿鳳鷙不同林此不相遇故不相聚惟同聲相應同氣相求此遇也故為萃也言其合聚而不㪚也天下之物散之則小合而聚之則積小以成其髙大故聚而上者升也升於徳則聖敬日躋若夫㝠升則有所蠱壞而困矣故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也凡人困於功名富貴然後可從於儉約故困於上者必反下故受之以井井居其所不可革其道則不可不革故受之以革革生為熟革剛為柔此革物者莫若鼎鼎者天下之重器主之者其惟長子乎故受之以震震以一陽在下故動飄風不終朝驟雨不終日此物不可以終動止之故受之以艮而艮者一陽在上二陰在下故為止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅藏舟於壑藏山於澤可謂固矣夜半有力者負之而走此物不可以終止故受之以漸漸者止於下而漸於上不終於止而有進也凡進者欲有歸也故受之以歸妹得其所歸者如文王得伯夷太公之歸此其所以大也故受之以豐豐者明之盛大之時然日中必昃月盈必食天地盈虛與時消息勿憂宜日中可也豐而太過則失其所居矣故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兑兑者說也説而後散之故受之以渙渙者離也物不可以終離故受之以節旅者親寡之時無所容也惟巽然後得所入故受之以巽而巽者入也入於道故有見而説故巽而受之以兑惟説於道故推而及人説而後散故受之以渙渙者乃萬民離㪚不安其居故為離也凡物之離者必有時而合故受之以節而節者順其人心説以行險節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉節天下以其節之道而民信之此出於中心之誠信非勉强也故受之以中孚人能有其信雖蠻貊之邦可行矣此有其信者必行之故受之以小過能髙於人而過之然後可以濟天下此小過受之以既濟然事至於既濟則人情倦於有為事之隳廢而物之窮也故受之以未濟然後民勉於從事矣此易所以終之以未濟雜卦乾剛坤柔比樂師憂此二卦無反對之畫比師序卦所以言易道之常雜卦所以言易道之變此古有是言也殊不知易之雜卦乃言卦畫反對各以類而言非雜也於雜之中有不雜存焉乾三畫奇剛也坤三畫耦柔也比一陽居五而民樂而從之師一陽居二而民憂而畏之臨觀之義或與或求臨觀臨者上有與於下觀者下有求於上或與或求乃一時之義屯見而不失其居蒙雜而著屯蒙物在屯難之中其居常蒙雜顓蒙而性當自著震起也艮止也震艮一陽在下故震為起一陽在上故艮為止損益盛衰之始也損益損而不已必益為盛之始益而不已必决為衰之始大畜時也无妄災也大畜妄无惟大畜之君子所以能安其時若无妄而有妄者乃為災也萃聚而升不來也萃升天地之理有聚有散惟順以説故聚也有徃有來惟聚而升故不來也謙輕而豫怠也謙豫謙而不持重者失於輕豫而不警戒者失於怠也噬嗑食也賁无色也噬嗑賁噬嗑除其間所以養其生故曰食也賁者設飾然終於白賁故無色也兌見而巽伏也兌巽兌一陰在上故見巽一陰在下故伏隨無故也蠱則飭也隨蠱能隨者則窮而能變豈有故邪事之蠱壞要在致力以治之故蠱為飭而飭有勁急之義剥爛也復反也剥復剥者五陰剥一陽而勢之爛有不救之理復者一陽生於下而復反其所也晋晝也明夷誅也晋夷明晋為日中過則明有所傷故為誅也誅言其傷井通而困相遇也井困井内不失已外不失人無所蔽也故為通至於困則敵然邂逅有不可免者咸速也恒乆也咸恒咸之無心故應之也速恒者久於其道故恒者久不可欲速也渙離也節止也渙節渙者民情散而離也節者民情有所憚而止也解緩也蹇難也解蹇天下之難旣解故安於佚樂每失於緩蹇者見險而止故為難睽外也家人内也睽人家睽者言其在外之迹若不相通家人由内以及外也否泰反其類也否泰否君子退而小人之類進也泰君子進而小人之類退也此其類所以相反也大壮則止遯則退也大壮遯四陽長而不可過故大壮則止也二陰長而馴致有害君子之理故陽當退大有衆也同人親也大有人同大有之時時和嵗豐萬物盛多故為衆也惟與人同故人皆歸而親之革去故也鼎取新也革鼎革弊所以去其故鼎亨所以取其新小過過也小過此卦無反對之畫天下失其中者故小有所過以復其中是過也乃所以救其不中者乎中孚信也中孚與小過卦相對而變者也天之生民其中有信此信由中也故為中孚豐多故也親寡旅也豐旅天下豐大之時其事故云多也在旅之時失上下之交故為親寡離上而坎下也離坎此卦無反對之畫乃相對而變者也離火炎上坎水流下其自然之性不可易也小畜寡也履不處也小畜屐宻雲不雨所濟者寡履行而不失其中不處也需不進也訟不親也需訟需者有所待故不進訟者險而健人誰親也大過顛也大過此卦無反對之畫當本末弱之時當從權以濟其難葢時之顛危故也姤遇也柔遇剛也姤夬一陰始生乃柔遇也作易者進陽而退陰以一陰之生為遇言出其不意也一陽之生為復言反其所也漸女歸待男行也漸妹歸漸有所待如女之待男然後行言其不躁進也頥養正也頥此卦無反對所養不正則是養其小者以害其大者也既濟定也既濟既濟天下之分皆得其所故定也歸妹女之終也歸妹女子以嫁為歸此終身仰望所以為終也未濟男之窮也未濟男子有志於四方今也剛柔失位而不當故未濟其已矣夫夬決也剛決柔也君子道長小人道憂也何世無君子何世無小人欲有君子而無小人是欲有陽而無陰也使小人之道有所憂危而不安者亦為足矣雜卦乃以其類相生惟乾坤坎離小過大過中孚頥八卦無反對此聖人之深意惟穆伯長老蘇明之諸家並不逹此南軒易説卷三
