body:
  text: 南軒易説易類提要臣等謹案南軒易説宋張栻撰案曹學佺蜀中廣記載是書十一卷以為張浚所作考浚紫巖易傳其本猶存與此别為一書學佺殊誤朱彝尊經義考亦作十一卷注云未見又引董真卿説已闕乾坤二卦此本乃嘉興曹溶從至元壬辰贛州路儒學學正胡順父刊本傳寫並六十四卦皆佚之僅始於繫辭天一地二一章較真卿所見彌為殘缺然卷端題曰繫辭上卷下而順父序稱魯人東泉王公分司廉訪章貢等路公餘講論嘗誦伊川易傳特闕繫辭留心訪求因得南軒解説易繫繕寫家藏儻合以並傳斯為完書乃出示知事吳将仕刊之學宫以補遺缺使與周易程氏傳大字舊本同傳於世云云是初刊此書亦僅託始於繫辭溶所傳寫僅佚其上卷之上耳序末有鉤摹舊本三小印一作謙卦一曰贛州胡氏知順父即贛人一曰和卿葢其字也乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀南軒易説序昔尹和靖語學者祁寛曰與其讀他書不若専讀易與其看伊川雜説不若専看伊川易傳又曰一日只念一卦閑時看繫辭周易程氏傳止於卦而不及繫非不及也以繫辭為易大傳不暇及也然易繫曰易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占其通論一經之大體如此不傳奚可伊川議論雖間見於遺書而終未完學者惜之至元壬辰魯人東泉王公分司廉訪章貢等路公餘講論因言辭謝衰病家食數年從事於易嘗誦伊川易傳特闕繫辭留心訪求遂得南軒解説易繫繕寫家藏好玩如寳聖人之言無有師保如臨父母欽哉欽哉儻合以並傳斯為完書乃出示知事吳將仕及路學宿儒議若命工刊之學宫以補遺闕使與周易程氏傳大字舊本並行於世可乎將仕洎諸儒復命曰斯文也蓋有待於今日也後之學者幸莫大焉順父承命校正敬録以付匠氏并序其槩於後是嵗季冬既望贑州路儒學學正權管學事胡順父序
