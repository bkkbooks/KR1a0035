body:
  text: 南軒易說卷一宋張栻撰繫辭上卷下天一地二天三地四天五地六天七地八天九地十陽數奇一三五七九是也隂數偶二四六八十是也故生於天者成於地生於地者成於天而天地五十五之數所以成變化行鬼神昆蟲之出入草木之生死不外乎是天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也一三五七九者此天數二十有五也二四六八十者此地數三十也合天地之數乃見五行其五位相得而各有合也故天一生水其性陽而地六之隂以成之地二生火其性隂而天七之陽以成之天三生木其性陽而地八之隂以成之地四生金其性隂而天九之陽以成之天五生土其性陽而地十之隂以成之此一與六共宗二與七共朋三與八為友四與九同道五與十相守故曰五位相得而各有合天數二十有五合地數三十此天地自然之數五十有五也夫天地自然之數盈虗消息徃來不停變化雖妙而數有以成之若月令所謂鳩化為鷹雀化為鴿林木乃茂草木黄落可以厯數推而迎之者此天地之數有以成其變化也鬼神雖幽而數有以行之若其神勾芒其神祝融其神蓐収其神𤣥㝠各司其時各治其職者此天地之數有以行鬼神也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五嵗再閏故再扐而後掛大衍之數本於天地之數五十有五而大衍之數五十者以五在五十之中也大衍之數五十其用四十有九者虛一為用也譬之土分旺於四季而不可見神農書云脾脈不可見見則人必死由此觀之天地之數五十有五而大衍之數止於五十者也夫棊以虛其一故善奕者莫能軍萬二千五百五十有五為一軍惟其所奇者五人所以軍之變無窮也天有十干而辰有十二此其所以善厯者莫能窮也大衍之數五十其用止於四十有九者非不用一也方其初也而一已在其中矣其道生於一立於兩成於三揲蓍之法虛一為無用之用所以象道之用四十九數㑹而總之所以象道之未判分之於左右手離之以為二所以象兩者不止於兩儀也凡所謂兩者無所不象也掛一於指所以象三者不止於三才所謂三者無所不象也揲之以四分蓍而揲之皆以四四為數者所以象四時也歸奇於扐歸其四之餘蓍合於掛者所以象閏五嵗再閏故再扐而後掛再扐再歸奇也兩也三也四時也閏月也皆自然之數也五嵗再閏者天有三百六十五度四分度之一日行遲一嵗一周天以全數言之則一年行三百六十度餘有六度一嵗之間所剰六度又有六小月是十二日也三年之中凡三十六日故閏一月又剰六日五年之中積二十四日加此六日故五嵗再閏揲蓍之法歸此三之奇數共成一扐與閏同也揲蓍法者用蓍草四十九分為左右手左小指内掛一莖先以左手内四莖數之留其餘如未遇四即留之復以右手内四莖數之又以其餘并左右手餘作一處仍以小指内所掛一莖湊之如此則第一揲若非五即九也留下第一揲所餘者蓍只将餘蓍依前揲復分左右手亦以所掛一莖湊之第二揲不四即八也第三揲亦如前其數亦不四即八也每爻三變然後成一爻第一揲不五即九第二揲不四即八第三揲亦不四即八此所謂十有八變而成卦也若三者俱多為老陰謂初得九次二次三俱得八是也此得純坤二拆若三者俱少為老陽謂初得五次二次三俱得四是也此得純乾一單兩少一多為少陰初與二三之間或得四或得五而有八也或二揲得四一揲得九皆為兩少一多也此得巽離兌兩多一少為少陽初與二三之間或得九或得八而有四也或二揲得四一揲得五皆兩多一少也此得震坎艮善揲者看左手即知右手第一揲左手餘一即知五也左手餘二亦知五也左手餘三亦知五也左手餘四亦知九也第二揲左手餘一即知四也餘二亦知四也餘三即知八也餘四即知八也此觀天數乃知地數每以兩手揲其餘各以其所掛湊乾之䇿二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也此特論乾坤二篇之䇿不論六子之策夫揲蓍之法三者俱少為老陽而三少之餘凡三十六故陽爻有三十六數焉總乾六爻則是乾之䇿二百一十六也三者俱多為老陰而三多之餘凡二十四故陰爻有二十四數焉總坤六爻則是坤之䇿百四十有四也總乾坤之䇿則為三百六十總六十四卦則為萬有一千五百二十以三百六十當期之日以萬有一千五百二十當萬物之數也此皆自然相當也一嵗之内舉成數而言之故以乾坤之䇿當三百六十為期之日也自乾坤終於坎離為上篇自咸恒終於既濟未濟為下篇也此二篇有三百八十四爻陰陽各居其半故乾之爻一百九十二每爻三十六一百九十二爻共計六千九百一十二䇿坤之爻一百九十二每爻二十四一百九十二爻共計四千六百單八䇿也以乾之六千九百一十二䇿合坤之四千六百單八䇿都總萬有一千五百二十䇿也以象萬物之數是度之長短量之多寡天之星辰皆不逃於萬有一千五百二十然此特乾坤老陰老陽之數耳而震坎艮為少陽之數少陽之數七也四七二十八每爻二十八一百九十二爻積五千三百七十六䇿巽離兊為少陰之數少陰之數八也四八三十二每爻三十二一百九十二爻積六千一百四十四䇿共總少陰少陽之數亦萬有一千五百二十大抵易之數不離於七九八六乾之䇿九四九三十六坤之䇿六四六二十四震坎艮之䇿七四七二十八巽離兌之䇿八四八三十二是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與祐神矣分而為二掛一以象三揲之以四歸奇於扐凡四營然後成一爻每爻三揲則十八變以成其卦也自此衍而信之則八卦之象可以窺天地之數自此觸類而長之則一卦可成六十四卦道之奥妙其原本於天也然道自此而顯徳行之塵迹其原本於人也然徳行自此而神其粗可以出同民患故可與酬酢其精可以賛化育故可與祐神子曰知變化之道者其知神之所為乎大而天地㪚而萬物舉皆囿於造化之道而為其推遷者也然變化豈能自運邪有神以行其變化者也故知變化之道者其知神之所為乎變者自無而出有化者自有而歸無日月之徃來寒暑之迭運雷霆之震驚風雨之散潤以至山岳之鼎峙江河之流注草木之榮枯蟲魚之出没無非變化之道有以為之樞機然變者不能以自變有神以變之化者不能以自化有神以化之故知變化之道者疑若窺測其妙也然能知神之所為而已至於陰陽不測者此又非知變化之道者所能知也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占易者無形之聖人而聖人者有形之易故易乃聖人之道而聖人者乃盡易之道者也故指易以為聖人可也指聖人以論易亦可也故曰易有聖人之道四焉故指其所之者易之辭也以言者尚之則言無不當矣化而裁之者易之變也以動者尚之則動無不時矣象其物宜者易之象也制器者象之則可以盡制物之智極數知來者易之占也卜筮者尚之則可以窮先知之神人能言以尚其辭動以尚其變制器以尚其象卜筮以尚其占則人皆可以為舜塗人可以為禹此無他以其得聖人之道故也是以君子将有爲也将有行也問焉而以言其受命也如響無有逺近幽深遂知来物非天下之至精其孰能與於此世之君子将欲有為而建功立業将欲有行而進用撫世詎可不問之以言播之天下傳之四方故民之從之速於置郵傳命不啻如響之應聲者以聖人之言不以逺邇而有間不以幽深而罔測凡物之來干我者近在眉睫之間逺在八荒之外莫不知之自非盡易之至精安能與此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此三五天地參而伍之義也一與六共宗二與七共朋三與八成友四與九同道五與十相守此參天地之數而成其行伍所以為變也以天之一而錯於地而生水以地之二而錯於天而生火以至天三錯地而生木地四錯天而生金凡此者謂之錯其數也老陽之數總於九老陰之數總於六以至少陰之數總於八少陽之數總於七凡此者謂之綜其數也人能參伍天地之數以通其變則水火金木經緯於天地之間以成天地之文者能成之而使之無虧矣人能錯綜天地之數以極其數則老陽老陰少陽少陰見天地之賾以定天下之象者能定之而無疑矣自非盡易之至變其孰能與於此易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫至精猶有所思也惟易則本无所思至變猶有所為也惟易則本无所為无思无為如鑑也然形至則應如谷也然聲至則應无思无為寂然不動感而遂通天下之故所以極天下之至神也夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至深者理之奥能極深則天下之志果有不通者乎幾者事之微能研幾則天下之務果有不成者乎然深之所以通天下之志者以其窮理之奥而天下之好惡取舎從違去就揆之以理莫不一以貫之而無所遺也幾之所以成天下之務者以其察事之微而天下之得失利害成敗存亡圖之於微莫不預為之計而無所廢也然深也有待於極不極則不能造其至幾也有待於研不研則不能窮其精故通天下之志成天下之務可以指其方隅而言之也至於神則不疾而速初未甞疾而速也感而遂通者乎不行而至初未甞行而至也寂然不動者乎子曰易有聖人之道四焉者此之謂也夫自至精至變而造於至神自唯深唯幾而造於唯神其原皆自於以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占以易有聖人之道四焉君子将有為也将有行也皆可以至於聖人之道故終之以此子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也此堯帝之命羲和厯象日月星辰推此以敬授人時者也武王之訪箕子以陳洪範以立九疇演此以相恊民居者也萬物所聽者命命此而已萬物所由者道道此而已而易果何為哉未嘗贅虧於其間也未嘗損益於其間也易之開物則因其數之自生者從而與之開也如出乎震相見乎離説言乎兌勞乎坎俾之流通而無所壅遏者歟易之成務則因其數之自成者從而與之成也如制禮於履作樂於豫明政於賁設教於臨俾之就緒而無所墜廢者歟夫開物則物咸得其性成務則物咸有成功凡道之在範圍之中者莫不冒之而無所遺此易所以用數而不役於數者歟是故聖人以通天下之志以定天下之業以斷天下之疑惟天地之數能開物也故聖人用之其深足以通天下之志惟天地之數能成務也故聖人用之其幾足以定天下之業惟天地之數能冒天下之道也故聖人用之其神足以斷天下之疑是故蓍之徳圓而神卦之徳方以知六爻之義易以貢聖人以此洗心退藏於宻吉凶與民同患甚哉天地之數所以成變化行鬼神大而日月寒暑微而草木昆蟲未有不冒於此者聖人之意以謂青黄黼黻吾固見之也謂天下皆離婁可乎金石絲竹吾固聞之也謂天下皆師曠可乎将欲家至戸曉而形之於言則言有不可傳者将欲鴻編大策而載之於書則書有不可盡者於是生蓍立卦而著其六爻之義者是乃示天下後世以天地之數者也故蓍之四十九其分其卦其揲以四歸奇於扐運量無窮者此圓而神也卦之六十四或奇或偶有小大之異别陰陽之殊致吉凶已定者此方以知也至於六爻或征而吉則以動而有功者貢於人也或征而凶則以動而有咎者貢於人也其得夫存亡憂虞悔吝雜然貢於人而均獲其利者此六爻之義交易而貢於人也夫蓍之四十九乃衍天地之數也卦之六十四乃備天地之數也爻之三百八十四乃通天地之數也聖人以此而示天下之人其心休焉一疵不染滌除澡雪無遑遽之勞無怵迫之患退藏於宻恬淡無為是乃善與人同患者也非以蓍卦六爻濟斯民之患而洗心退藏者乎大扺厥初生民不知多寡也聖人為斗量以畀之則不必為之較龠合而民咸知其多寡矣民不知輕重也聖人為權衡以畀之則不必為之較錙銖而民咸知其輕重矣夫民之於吉凶其甚於多寡輕重也聖人為之蓍為之卦為之六爻以濟民行使天下之人咸知其是非利害得失臧否吾又何必營為以憂其故邪以此洗心退藏於宻是乃吉凶與民同患者乎神以知來知以藏徃其孰能與於此哉古之聰明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其徳夫古本綴上文聖人以此洗心退藏於宻吉凶與民同患神以知来知以藏徃作一段說者云屏思慮而安其厥躬者聖人同患於民而不汨其身也察安危以存其古訓者天下知其吉凶而均獲其利也如此天下之民皆即蓍之神以知其來可以探賾而索隠可以鈎深而致逺見不見之形抽不抽之緒三揲而一爻具十八變而一卦成愆忒以是而决臧否由是而著此神以知來蓍可以窮天地之數也即卦之知以藏其徃可以鑒古昔之興衰可以察前日之得失堯舜致衣裳之治湯武成炳虎之文考明夷而知箕子觀旣濟而知髙宗囊括太始包裹太極此知以藏往卦可以該天地之數也能盡此以推之天下與來世乃古之聰明睿知神武而不殺者夫今夫伏羲之始作八卦神農之制耒耜黄帝之迎日推策堯之厯象日月星辰舜之在璿璣玉衡以齊七政夏禹之連山成湯之歸藏文王之重卦武王之洪範孔子之十翼皆覺之於心悟之於性其聰所以聞天下之不聞其明所以見天下之不見其睿則黙識心通不待教而能者乎其知則神解意悟不待學而知者乎夫聰明睿知則智周乎萬物必思道濟天下此神武而不殺俾民知懼無有師保如從父母甲兵不施刑措不用而人為君子之歸者此聖人濟民行者乎今夫變化之推遷陰陽之運量七宿軫轉六甲内馴無非天之道也禍福之倚伏利害之相摩進退存亡吉凶悔吝無非民之故也聖人知幽明之故知死生之說知鬼神之情状所謂天之道固已明之也乆矣吉事有祥象事知器占事知來所謂民之故固己察之也熟矣奈何知進而不知退知存而不知亡昧於消息盈虛者又烏能明於天之道邪安其危而利其葘樂其所以亡暗於得失利害者又烏能察於民之故邪聖人憂之是興神物以前民用乃所以為天下後世設也蓍植物也足以揲天地之數龜動物也足以見天地之象故天能生之而不能興之惟聖人用其四十九而幽賛於神明者所以興其蓍也鑚之七十二而置之前者所以興其龜也天下之民其終不倦而樂於有為亹亹不忘而勇於有行者以其有蓍龜以前之也聖人深居簡出利用安身齋以去其不一之思戒以防其不測之患神明其徳有莫知其所以然者矣是故闔戸謂之坤闢戸謂之乾一闔一闢謂之變徃來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神夫自太極既判兩儀肇焉故闔戸之坤所以包括萬物而得陰也闢户之乾所以敷生萬物而得陽也即乾坤之一闔一闢所以謂之變即乾坤之徃來不窮所以謂之通夫乾坤者生成萬物之體也變化者乃乾坤生化萬物之用也其覆載範圍之中可得而見者謂之象也可指其形者謂之器也有聖人制而用之所以謂之法也利用出入民咸用之而不可測者謂之神也是故易有大極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業易有大極者函三為一此中也如立天之道曰陰與陽而大極乃陰陽之中者乎立地之道曰柔與剛而大極乃剛柔之中者乎立人之道曰仁與義而大極乃仁義之中者乎此大極函三為一乃皇極之中道也是以聖人作易所謂六爻者乃三極之道故三才皆得其中是乃順性命之理也爰自大極既判乃生兩儀者在天為陰陽在地為柔剛在人為仁義雖曰陰陽不可指為陰陽雖曰柔剛不可指為柔剛雖曰仁義不可指為仁義乃儀則具存而有對代者也夫有兩儀則一與六共宗二與七共朋三與八同道四與九相友存一而六具有二而七存有三而八著有四而九生此七九八六乃易之四象天一之水得六而居北於卦為坎地二之火得七而居南於卦為離天三之木得八而居東於卦為震地四之金得九而居西於卦為兊是以坎之數六去三而餘三此三畫之乾所以生於西北離之數七去三而餘四此四畫之巽所以生於東南兊之數九去三而餘六此六畫之坤所以生於西南震之數八去三而餘五此五畫之艮所以生於東北乃四象生八卦也及夫八卦既具則乾之䇿乃四九三十六䇿坤之䇿乃四六二十四䇿震坎艮之䇿乃四七之䇿也巽離兊之䇿乃四八之䇿也道之妙也由是而顯徳之粗也由是而神可與祐神可與酬酢則吉凶豈有不定者乎吉凶既定則知其利之可興害之可除伏羲之興網罟神農之制耒耜黄帝堯舜之垂衣裳與夫帝之所興王之所成所以舉而措之天下之民者無非本於此也是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隠鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜夫易有大極而降以生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業此易之興乎世聖人之興乎易易所以垂之天下後世者也雖然物固有法象至於法象之大者莫大乎天地物固有變通至於變通之大者莫大乎四時水火固著明矣然垂象著明惟在天之日月為莫大也爵齒固崇髙矣然崇髙之極惟寳位之富貴為莫大也以至備物致用立成器以為天下俾民養生䘮死仰事俯育用之不窮者所以莫大於聖人也探賾索隠鉤深致逺定天下之吉凶俾民避害趨利去危即安以前民用者所以莫大於蓍龜也是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之天生神物謂蓍龜之探賾索隠鉤深致逺者是也聖人則之以明易之象數天地變化謂陰陽之消息盈虛徃來進退者是也聖人效之而為六十四卦天垂象謂天之經緯錯雜縦横昭著者是也聖人象之而為三百八十四爻夫易之象數卦爻聖人皆得於心而必參之天地者蓋聖人之心與天地之心相似其愛人之心初未嘗不同也然天欲雨山川必先雲氣况易之興也豈無先至之祥乎是以聖人必終之以河出圖洛出書而又則之者則其皇天以興其易者乎又况河圖不出吾已矣夫孔子嘗有是嘆九洛之事治成徳備荘周嘗有是言聖人則之度其時以卜其道之将興於世也大扺通於天者河也有龍馬負圖而出此聖人之徳上配於天而天降其祥也中於地者洛也有神龜載書而出此聖人之徳下及於地而地呈其瑞也聖人則之故易興於世然後象數推之以前民用卦爻推之以濟民行而推之天下後世也而世儒之說乃謂伏羲得河圖洛書以作八卦果如是則不當曰伏羲始畫八卦也而鄭康成溺於緯書乃云河圖有九篇洛書有二篇而孔安國又以河圖為八卦洛書為九疇此皆蕪穢聖經者矣甚者以天生神物天地變化與夫天垂象河出圖洛出書為四象者此尤不經學者不可不辨易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易自大極既判兩儀生四象夫四象既具而列於四方分為五行而七九八六之數乃生八卦此易所以示者言其示於人也是以聖人當辨物正言而又斷之以辭故為繇辭而又為爻辭為之彖辭而又為之象辭皆繫續其辭所以告者言其告於人也夫易有四象以示其人示其吉凶也至於不得已而有辭以告其人者告其吉凶也夫示人以吉凶告人以吉凶無非俾人自探也然猶有安其危而利其葘樂其所以亡者故定之以吉凶如畫一之易知如白黒之易辨㫁然使人易知也故征吉貞凶貞吉征凶大吉終吉之類有凶終凶之類聖人至此可謂至矣盡矣易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也在天有理惟順以循其理則天必眷顧而不違在人有心惟信以結其心則人必歸徃而來輔大有上九以謂吾之信固足以感乎人矣然賢者人之所望也詎可不以吾之信以信其賢乎吾之順固足以格乎天矣然賢者天之所賚也詎可不以吾之順以順其賢乎始焉盡信順之徳獲天人之助終焉推信順之徳以之而尚賢如此則其謙足以格天其誠足以動天自天祐之吉无不利固其宜也由此觀之則天不妄祐人而人當反求諸己如大有之上九庻幾獲祐而無所愧也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼔之舞之以盡神言蔓衍而无窮非書之簡册所能載意幽深而罔測非言之聲音所能窮也然則聖人之意其不可見乎此立象所以盡意也又况以言告人告之愈切而認其言者求之愈逺不若立象而示人以意是以瞽者不識日問人而人告之曰日之明也如燭他日有捫其籥以為日者又告之曰日之圓如盂他日有捫其盤以為日者矣夫告之以其明如燭其圓如盂言之切者也奈何認其言而失之逺者乃捫籥以為日而捫盤以為日焉此言不能盡意也聖人憂之所以立天以象乾立地以象坤以至以雷以水以山而象震坎艮焉以風以火以澤而象巽離兊焉凡易者象也象也者像此者也無適而非象者欲其即象以求其意非吝於言也慮天下後世求之於言而失之逺也賾不易見也聖人見賾而立象此象所以盡意也變不易觀也聖人觀變而立卦此卦所以盡情偽也情不易知也聖人逹情而為辭此繫所以盡其言也凡此三者聖人作易而寓於書者也若夫變而通之者俾民仰事俯育養生送死耕而食織而衣舟楫以濟其川塗室宇以禦其風雨一日不可無萬世不可易均獲其利者此推之卦象繫辭變而通之以盡其利者歟鼔之舞之其道宻庸其化罔測動静變化易其思慮徳威之震疊徳風之摇蕩由之而罔覺用之而不知咸妙於神者此推其卦象繫辭鼔之舞之以盡其神者歟乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣乾坤其易之門邪言易出入於乾坤也乾坤其易之緼邪言易含畜於乾坤也故乾成位乎上坤成位乎下而易立乎其中矣故乾坤者人之四支而易者人之精神也方其首圓足方胷南背北則精神有所託而立乎其中矣若夫四支隳廢則精神㪚而之他而手足亦幾乎息矣夫乾坤初未嘗毁而易亦未嘗不可見也聖人設此辭者欲天下後世求易者當即乾坤以求之歟是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業道不離形特形而上者也器異於道以形而下者也試以天地論之隂陽者形而上者也至於穹窿磅礴者乃形而下者歟離形以求道則失之恍惚不可為象此老荘所謂道也非易之所謂道也易之論道器特以一形上下而言之也然道雖非器禮樂刑賞是治天下之道也禮雖非玉帛而禮不可以虛拘樂雖非鐘皷而樂不可以徒作刑本遏惡也必託於甲兵必寓於鞭扑賞本揚善也必表之以旂常必銘之於鍾鼎是故形而上者之道託於器而後行形而下者之器得其道而無弊聖人悟易於心覺易於性在道不泥於無在器不墮於有徼妙並觀有無一致故化而裁之者明乎道器窮而能變也推而行之者察乎道器變而能通也舉而措之天下之民以至於為網罟為耒耜作舟車作書契天下後世不可無萬世不可易乃推其道器舉而措之天下而世之人指之為事業也是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼔天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎徳行聖人見天下之賾所以立象者示人以賾也聖人見天下之動所以生爻者示人以動也然象固示人以賾矣苟不寓之於卦何以極天下之賾乎爻固示人以動矣苟不託之於辭何以鼔天下之動乎故由象而畫卦自爻而為辭聖人之於天下何其憂之甚深而慮之甚切也然象之與卦爻之與辭皆載在方册化而裁之不失其中必存乎能通其變者乎推而行之無有紀極必存乎能變而通者乎神而明之傳之於心者存乎其人如伏羲神農堯舜文王周孔者是也黙而成之悟之於理者不言而信存乎徳行如文王之亨于岐山箕子之明夷利貞顔子之殆庻幾而得其不逺復孟子之明仁義而終身未嘗言易者是也大傳後世所傳聖人之言其終之以神而明之存乎其人黙而成之不言而信存乎徳行深慮天下後世徒泥其簡册言語而不能求聖人之心者乎南軒易説卷一
